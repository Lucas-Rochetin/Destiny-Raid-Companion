name: Deployment de Production

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du repo
        uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer dépendances backend
        run: |
          cd app/backend
          npm install

      - name: Installer dépendances frontend
        run: |
          cd app/frontend
          npm install

      - name: Lancer les tests
        run: |
          cd app/backend
          npm run test --if-present

  docker:

    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du repo
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build images
        run: |
            cd app
            docker compose build

      - name: Push images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/destiny-raid-companion-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/destiny-raid-companion-frontend:latest