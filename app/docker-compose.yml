services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: lucasrochetin/destiny-raid-companion-frontend:latest
    container_name: destiny-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: lucasrochetin/destiny-raid-companion-backend:latest
    container_name: destiny-backend
    ports:
      - "3002:3002"
    restart: unless-stopped
    depends_on:
      - postgres
      - mongo
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/appdb
      MONGO_URL: mongodb://mongo:27017/appdb

  postgres:
    image: postgres:15
    container_name: destiny-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: destiny-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data: